name: CI

# Fast feedback on every PR and push to main: just type-check and unit
# tests, no installers. Keeps the matrix small and the bill reasonable.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo test (no tests yet, but proves the harness works)
        working-directory: src-tauri
        run: cargo test --no-run
        # We don't `cargo test --no-run --release` here because dev profile
        # is enough to prove the test harness compiles, and skipping the
        # release build keeps CI under a minute.
