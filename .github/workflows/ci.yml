name: CI

# Fast feedback on every PR and push to main: just type-check and unit
# tests, no installers. Keeps the matrix small and the bill reasonable.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # The Ubuntu image rolls forward every few months; libwebkit2gtk and
      # libsoup have shipped breaking ABI changes. Fall back to older
      # versions so the matrix survives an image bump.
      # (Same pattern as project-graph's release workflow.)
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Core build tools
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            patchelf \
            file
          # GTK stack
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          # WebKit2GTK — try 4.1 first, fall back to 4.0
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          # libsoup — try 3.0 first, fall back to 2.4
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo test (no tests yet, but proves the harness works)
        working-directory: src-tauri
        run: cargo test --no-run
        # We don't `cargo test --no-run --release` here because dev profile
        # is enough to prove the test harness compiles, and skipping the
        # release build keeps CI under a minute.
